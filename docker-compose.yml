services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: overturemaps-postgis-h3:17-3.5
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: overturemaps
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - max_worker_processes=8
      - -c
      - max_parallel_workers=8
      - -c
      - max_parallel_maintenance_workers=4

  server:
    build: .
    depends_on:
      - db
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: overturemaps

volumes:
  pgdata:
