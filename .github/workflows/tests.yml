name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install duckdb==1.4.3 psycopg2-binary==2.9.11 pytest

      - name: Run tests
        run: pytest tests/ -v
